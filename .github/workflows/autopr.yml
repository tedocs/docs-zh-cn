name: Auto PR (Sync & Translate)

on:
  schedule:
    - cron: "17 3 * * 1" # Weekly on Monday at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REPO: vuejs/docs
  SYNC_BRANCH: sync
  TARGET_BRANCH: main

jobs:
  # ── Sync: detect → merge → translate → apply (single runner) ──
  sync-merge-translate-apply:
    runs-on: ubuntu-latest
    outputs:
      merge_result: ${{ steps.detect.outputs.merge_result }}
      merge_status: ${{ steps.merge.outputs.merge_status }}
      conflict_files: ${{ steps.detect.outputs.conflict_files }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
      upstream_hash: ${{ steps.detect.outputs.upstream_hash }}
      done_file_exists: ${{ steps.check-done.outputs.done_file_exists }}
    env:
      GITHUB_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
      UPSTREAM_BRANCH: upstream
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # Restore all scripts from main (one-time, persists across steps)
      - name: Restore scripts from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- \
            .github/scripts/auto-pr/ \
            .claude/skills/vuejs-docs-zh-cn/ \
            package.json \
            pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --no-frozen-lockfile
          bun install -g @github/copilot

      # ── 1. Detect changes ──
      - name: Detect changes
        id: detect
        run: bun .github/scripts/auto-pr/1-detect-changes-job.js

      # ── 2. Merge upstream ──
      - name: Merge upstream
        id: merge
        if: steps.detect.outputs.merge_result != 'no_changes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin upstream

          if git merge origin/upstream --no-edit; then
            echo "merge_status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge has conflicts, 2-merge-job.js will resolve them."
          fi

      - name: Resolve conflicts with 2-merge-job.js
        if: steps.merge.outputs.merge_status == 'conflict'
        run: bun .github/scripts/auto-pr/2-merge-job.js

      # ── 3. Translate conflict blocks ──
      - name: Translate with Copilot CLI
        id: translate
        if: steps.merge.outputs.merge_status == 'conflict'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          UPSTREAM_HASH: ${{ steps.detect.outputs.upstream_hash }}
        run: bun .github/scripts/auto-pr/3-translate-job.js

      # ── 4. Apply translations ──
      - name: Check done-translation.json
        id: check-done
        if: steps.merge.outputs.merge_status == 'conflict'
        run: |
          if [ -f ".github/scripts/auto-pr/done-translation.json" ]; then
            echo "done_file_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "done_file_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply translations
        if: steps.check-done.outputs.done_file_exists == 'true'
        run: bun .github/scripts/auto-pr/4-apply-job.js

      # ── Push once after everything ──
      - name: Commit and push to sync
        if: steps.detect.outputs.merge_result != 'no_changes'
        env:
          MERGE_RESULT: ${{ steps.detect.outputs.merge_result }}
          UPSTREAM_HASH: ${{ steps.detect.outputs.upstream_hash }}
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "sync: merge upstream $UPSTREAM_HASH

          - Merge result: $MERGE_RESULT
          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Create PR and request review ─────────────────────────────
  create-pr-and-review:
    needs: sync-merge-translate-apply
    if: |
      always() &&
      needs.sync-merge-translate-apply.result == 'success' &&
      needs.sync-merge-translate-apply.outputs.merge_result != 'no_changes'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_HASH: ${{ needs.sync-merge-translate-apply.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          # Check if PR already exists
          existing_pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #${existing_pr}"
            echo "pr_number=${existing_pr}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create new PR
          pr_url=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --title "Sync #${UPSTREAM_HASH} — upstream merge & translate" \
            --body "$(cat <<EOF
          ## Upstream Sync

          - Upstream: \`${{ env.UPSTREAM_REPO }}\` @ \`${UPSTREAM_HASH}\`
          - Merge result: \`${{ needs.sync-merge-translate-apply.outputs.merge_result }}\`

          ### Changes
          $(if [ -n "${{ needs.sync-merge-translate-apply.outputs.conflict_files }}" ]; then
            echo "#### Conflict files (resolved)"
            echo "${{ needs.sync-merge-translate-apply.outputs.conflict_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)
          $(if [ -n "${{ needs.sync-merge-translate-apply.outputs.changed_files }}" ]; then
            echo "#### Translated files"
            echo "${{ needs.sync-merge-translate-apply.outputs.changed_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)

          > Automated by [autopr.yml](.github/workflows/autopr.yml)
          EOF
          )" \
            --label "从英文版同步" \
            --label "请使用 merge commit 合并")

          pr_number=$(echo "$pr_url" | grep -oP '\d+$')
          echo "Created PR: #${pr_number}"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          pr_number="${{ steps.pr.outputs.pr_number }}"
          repo="${{ github.repository }}"

          # Request Copilot PR reviewer
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/pulls/${pr_number}/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}'

          # Post review instruction
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/issues/${pr_number}/comments" \
            -d '{"body":"@copilot review\n\nPlease review this automated sync PR:\n1. Translation accuracy per [conventions](https://github.com/'"${repo}"'/blob/main/.claude/skills/vuejs-docs-zh-cn/SKILL.md)\n2. No unintended content changes\n3. Markdown formatting preserved\n4. Code blocks and links intact"}'

          echo "Review requested on PR #${pr_number}"
