name: Auto PR (Sync & Translate)

on:
  schedule:
    - cron: "17 3 * * 1" # Weekly on Monday at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REPO: vuejs/docs
  SYNC_BRANCH: sync
  TARGET_BRANCH: main

jobs:
  # ── Step 1: Detect merge status & changed files ────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      merge_result: ${{ steps.detect.outputs.merge_result }}
      conflict_files: ${{ steps.detect.outputs.conflict_files }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
      upstream_hash: ${{ steps.detect.outputs.upstream_hash }}
    env:
      GITHUB_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
      UPSTREAM_BRANCH: upstream
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Restore scripts from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- scripts/merge-upstream-to-sync.js package.json pnpm-lock.yaml

      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile

      - name: Detect changes
        id: detect
        run: bun scripts/merge-upstream-to-sync.js

  # ── Step 2: Merge upstream ─────────────────────────────────────
  merge:
    needs: detect-changes
    if: needs.detect-changes.outputs.merge_result != 'no_changes'
    runs-on: ubuntu-latest
    outputs:
      merge_status: ${{ steps.merge.outputs.merge_status }}
    env:
      MERGE_RESULT: ${{ needs.detect-changes.outputs.merge_result }}
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Merge upstream
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin upstream

          # Attempt merge
          if git merge origin/upstream --no-edit; then
            echo "merge_status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge has conflicts, 1-merge-job.js will resolve them."
          fi

      - name: Restore merge script from main
        if: steps.merge.outputs.merge_status == 'conflict'
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- .github/scripts/auto-pr/1-merge-job.js

      - name: Resolve conflicts with 1-merge-job.js
        if: steps.merge.outputs.merge_status == 'conflict'
        run: bun .github/scripts/auto-pr/1-merge-job.js

      - name: Commit merge
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit after merge."
            exit 0
          fi

          git commit -m "sync: merge upstream $UPSTREAM_HASH

          - Merge result: $MERGE_RESULT
          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Step 3: Translate conflict blocks via Copilot CLI ──────────
  translate:
    needs: [detect-changes, merge]
    if: needs.merge.outputs.merge_status == 'conflict'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Install Copilot CLI
        run: bun install -g @github/copilot

      - name: Restore scripts and conventions from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- \
            .github/scripts/auto-pr/2-translate-job.js \
            .claude/skills/vuejs-docs-zh-cn/

      - name: Translate with Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: bun .github/scripts/auto-pr/2-translate-job.js

      - name: Commit and push translations
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi

          git commit -m "sync: translate conflict blocks

          - Translated changed .md files
          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Step 4: Apply translations to source files ────────────────
  apply:
    needs: [detect-changes, merge, translate]
    if: needs.merge.outputs.merge_status == 'conflict'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - name: Restore apply script from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- .github/scripts/auto-pr/3-apply-job.js

      - name: Apply translations
        if: hashFiles('.github/scripts/auto-pr/done-translation.json') != ''
        run: bun .github/scripts/auto-pr/3-apply-job.js

      - name: Commit and push applied translations
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No applied translation changes to commit."
            exit 0
          fi

          git commit -m "sync: apply translations to source files

          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Step 5: Create PR and request review ───────────────────────
  create-pr-and-review:
    needs: [detect-changes, merge, translate, apply]
    if: always() && needs.merge.result == 'success' && needs.translate.result != 'failure' && needs.apply.result != 'failure'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          # Check if PR already exists
          existing_pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #${existing_pr}"
            echo "pr_number=${existing_pr}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create new PR
          pr_url=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --title "Sync #${UPSTREAM_HASH} — upstream merge & translate" \
            --body "$(cat <<EOF
          ## Upstream Sync

          - Upstream: \`${{ env.UPSTREAM_REPO }}\` @ \`${UPSTREAM_HASH}\`
          - Merge result: \`${{ needs.detect-changes.outputs.merge_result }}\`

          ### Changes
          $(if [ -n "${{ needs.detect-changes.outputs.conflict_files }}" ]; then
            echo "#### Conflict files (resolved)"
            echo "${{ needs.detect-changes.outputs.conflict_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)
          $(if [ -n "${{ needs.detect-changes.outputs.changed_files }}" ]; then
            echo "#### Translated files"
            echo "${{ needs.detect-changes.outputs.changed_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)

          > Automated by [autopr.yml](.github/workflows/autopr.yml)
          EOF
          )" \
            --label "从英文版同步" \
            --label "请使用 merge commit 合并")

          pr_number=$(echo "$pr_url" | grep -oP '\d+$')
          echo "Created PR: #${pr_number}"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          pr_number="${{ steps.pr.outputs.pr_number }}"
          repo="${{ github.repository }}"

          # Request Copilot PR reviewer
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/pulls/${pr_number}/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}'

          # Post review instruction
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/issues/${pr_number}/comments" \
            -d '{"body":"@copilot review\n\nPlease review this automated sync PR:\n1. Translation accuracy per [conventions](https://github.com/'"${repo}"'/blob/main/.claude/skills/vuejs-docs-zh-cn/SKILL.md)\n2. No unintended content changes\n3. Markdown formatting preserved\n4. Code blocks and links intact"}'

          echo "Review requested on PR #${pr_number}"
