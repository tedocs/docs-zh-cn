name: Auto PR (Sync & Translate)

on:
  schedule:
    - cron: "17 3 * * 1" # Weekly on Monday at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REPO: vuejs/docs
  SYNC_BRANCH: sync
  TARGET_BRANCH: main

jobs:
  # ── Step 1: Detect merge status & changed files ────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      merge_result: ${{ steps.detect.outputs.merge_result }}
      conflict_files: ${{ steps.detect.outputs.conflict_files }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
      upstream_hash: ${{ steps.detect.outputs.upstream_hash }}
    env:
      GITHUB_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
      UPSTREAM_BRANCH: upstream
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Restore scripts from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- scripts/auto-pr.js package.json pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile

      - name: Detect changes
        id: detect
        run: node scripts/auto-pr.js

  # ── Step 2: Merge upstream ─────────────────────────────────────
  merge:
    needs: detect-changes
    if: needs.detect-changes.outputs.merge_result != 'no_changes'
    runs-on: ubuntu-latest
    outputs:
      merge_status: ${{ steps.merge.outputs.merge_status }}
    env:
      MERGE_RESULT: ${{ needs.detect-changes.outputs.merge_result }}
      CONFLICT_FILES: ${{ needs.detect-changes.outputs.conflict_files }}
      CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Merge upstream
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin upstream

          # Attempt merge
          if git merge origin/upstream --no-edit; then
            echo "merge_status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge has conflicts, Copilot CLI will resolve them."
          fi

      - name: Resolve conflicts with Copilot CLI
        if: steps.merge.outputs.merge_status == 'conflict'
        env:
          # Requires Fine-Grained PAT with "Copilot Requests" permission
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          # List conflicted files
          conflict_files=$(git diff --name-only --diff-filter=U)
          echo "Conflicted files:"
          echo "$conflict_files"

          # Let Copilot CLI resolve conflicts
          copilot -p "
          You are working on the sync branch of a Vue.js Chinese translation repository.
          There are merge conflicts from merging the upstream English docs (vuejs/docs).

          Your task:
          1. For each conflicted file, read the conflict markers (<<<<<<<, =======, >>>>>>>)
          2. Keep existing Chinese translations (OURS) as-is
          3. Translate any NEW or CHANGED English content (THEIRS) into Chinese
          4. Write the resolved file without conflict markers

          Translation conventions to follow:
          - $(cat .claude/skills/vuejs-docs-zh-cn/references/terminology.md)
          - $(cat .claude/skills/vuejs-docs-zh-cn/references/formatting.md)
          - $(cat .claude/skills/vuejs-docs-zh-cn/references/guidelines.md)

          Conflicted files:
          $conflict_files

          After resolving all conflicts, stage the resolved files with git add.
          " --allow-all

      - name: Commit merge
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit after merge."
            exit 0
          fi

          git commit -m "sync: merge upstream $UPSTREAM_HASH

          - Merge result: $MERGE_RESULT
          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Step 3: Translate changed .md files ───────────────────────
  translate:
    needs: [detect-changes, merge]
    if: needs.merge.outputs.merge_status == 'clean' && needs.detect-changes.outputs.changed_files != ''
    runs-on: ubuntu-latest
    env:
      CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Restore translation conventions from main
        run: |
          git checkout origin/${{ env.TARGET_BRANCH }} -- .claude/skills/vuejs-docs-zh-cn/

      - name: Translate changed .md files with Copilot CLI
        env:
          # Requires Fine-Grained PAT with "Copilot Requests" permission
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra files <<< "$CHANGED_FILES"
          for file in "${files[@]}"; do
            # Only process .md files in src/ directory
            if [[ "$file" == src/* && "$file" == *.md ]]; then
              echo "Translating: $file"
              copilot -p "
              You are a professional Vue.js documentation translator (English → Simplified Chinese).

              Target file: $file

              ## Scope

              Only translate Markdown (.md) files. This file IS a Markdown file — proceed with translation.

              ## What to translate

              1. All English prose content (paragraphs, headings, list items, table cells).
              2. VitePress custom container content — these blocks MUST be translated:
                 - \`\`\`:::tip ... :::\`\`\`
                 - \`\`\`:::warning ... :::\`\`\`
                 - \`\`\`:::danger ... :::\`\`\`
                 - \`\`\`:::info ... :::\`\`\`
                 The text inside these containers is natural language and should be translated to Chinese.

              ## What NOT to translate

              1. Fenced code blocks — do NOT modify content inside:
                 - \`\`\`vue\`\`\` blocks (Vue SFC code snippets) — keep entirely as-is, including comments
                 - \`\`\`js\`\`\`, \`\`\`ts\`\`\`, \`\`\`html\`\`\`, \`\`\`css\`\`\`, \`\`\`sh\`\`\` and any other language blocks
                 - Generic \`\`\` blocks without a language tag
              2. Inline code (backtick-wrapped text)
              3. URLs and link targets
              4. Code identifiers (component names, API names, props, etc.)
              5. Frontmatter — keep as-is except translate the \`title\` and \`description\` fields

              ## Translation conventions

              You MUST strictly follow these conventions:

              ### Terminology
              $(cat .claude/skills/vuejs-docs-zh-cn/references/terminology.md)

              ### Formatting
              $(cat .claude/skills/vuejs-docs-zh-cn/references/formatting.md)

              ### Guidelines
              $(cat .claude/skills/vuejs-docs-zh-cn/references/guidelines.md)

              ## Output

              Write the translated file back to $file. Ensure the line count stays as close to the original as possible (line-by-line correspondence).
              " --allow-all
            fi
          done

      - name: Commit and push translations
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi

          git commit -m "sync: translate upstream changes

          - Translated changed .md files
          - Upstream: ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_HASH }}"

          git push origin ${{ env.SYNC_BRANCH }} --force-with-lease

  # ── Step 4: Create PR and request review ───────────────────────
  create-pr-and-review:
    needs: [detect-changes, merge, translate]
    if: always() && needs.merge.result == 'success'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_HASH: ${{ needs.detect-changes.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.REPO_ACTION_TOKEN }}

      - name: Create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          # Check if PR already exists
          existing_pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #${existing_pr}"
            echo "pr_number=${existing_pr}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create new PR
          pr_url=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ env.TARGET_BRANCH }}" \
            --head "${{ env.SYNC_BRANCH }}" \
            --title "Sync #${UPSTREAM_HASH} — upstream merge & translate" \
            --body "$(cat <<EOF
          ## Upstream Sync

          - Upstream: \`${{ env.UPSTREAM_REPO }}\` @ \`${UPSTREAM_HASH}\`
          - Merge result: \`${{ needs.detect-changes.outputs.merge_result }}\`

          ### Changes
          $(if [ -n "${{ needs.detect-changes.outputs.conflict_files }}" ]; then
            echo "#### Conflict files (resolved)"
            echo "${{ needs.detect-changes.outputs.conflict_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)
          $(if [ -n "${{ needs.detect-changes.outputs.changed_files }}" ]; then
            echo "#### Translated files"
            echo "${{ needs.detect-changes.outputs.changed_files }}" | tr ',' '\n' | sed 's/^/- /'
          fi)

          > Automated by [autopr.yml](.github/workflows/autopr.yml)
          EOF
          )" \
            --label "从英文版同步" \
            --label "请使用 merge commit 合并")

          pr_number=$(echo "$pr_url" | grep -oP '\d+$')
          echo "Created PR: #${pr_number}"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.REPO_ACTION_TOKEN }}
        run: |
          pr_number="${{ steps.pr.outputs.pr_number }}"
          repo="${{ github.repository }}"

          # Request Copilot PR reviewer
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/pulls/${pr_number}/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}'

          # Post review instruction
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${repo}/issues/${pr_number}/comments" \
            -d '{"body":"@copilot review\n\nPlease review this automated sync PR:\n1. Translation accuracy per [conventions](https://github.com/'"${repo}"'/blob/main/.claude/skills/vuejs-docs-zh-cn/SKILL.md)\n2. No unintended content changes\n3. Markdown formatting preserved\n4. Code blocks and links intact"}'

          echo "Review requested on PR #${pr_number}"
